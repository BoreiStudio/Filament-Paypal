version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      laravel:
        patterns:
          - "laravel/*"
      filament:
        patterns:
          - "filament/*"
      test:
        patterns:
          - "pestphp/*"
          - "mockery/*"
          - "orchestra/*"
          - "larastan/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
